<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor/CarRental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>
    
    <nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Rental System</a>
    <div>
     <a href="vehicles.html" class="btn btn-outline-light btn-sm me-2">Vehicles</a>
     <a href="rent.html" class="btn btn-outline-light btn-sm me-2">Rent</a>
     <a href="logs.html" class="btn btn-outline-light btn-sm me-2">Logs</a>
     </div>
    </div>
    </nav>

   <div class="container mt-4">
    <h4 class="mb-4">Dashboard</h4>

    <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
        <div class="card text-center p-3">
            <div class="text-muted small">Total Vehicles</div>
                <div class="fs-3 fw-bold" id="totalCount">0</div>
    </div>
   </div>
      <div class="col-6 col-md-3">
        <div class="card text-center p-3">
            <div class="text-muted small">Available</div>
                <div class="fs-3 text-success" id="availCount">0</div>
    </div>
   </div>
     <div class="col-6 col-md-3">
        <div class="card text-center p-3">
            <div class="text-muted small">Rented</div>
                <div class="fs-3 text-warning" id="rentcount">0</div>
    </div>
   </div>
       <div class="col-6 col-md-3">
        <div class="card text-center p-3">
            <div class="text-muted small">Maintenance</div>
                <div class="fs-3 text-danger" id="MainCount">0</div>
    </div>
   </div>
  </div>

  <h5>Fleet overview</h5>
  <div class="row g-3" id="fleetContainer">
    <div class="text-muted">Loading...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    renderDashboard();
  </script>
</body>
</html>
