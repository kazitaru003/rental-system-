<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class ="navbar navbar-dark bg-dark">
     <div class="container">
      <a class="navbar-brand" href="index.html">Rental System</a>
       <div>
        <a href="vehicles.html" class="btn btn-outline-light btn-sm me-2 active">Vehicles</a>
         <a href="rent.html" class="btn btn-outline-light btn-sm me-2 active">Rent</a>
         <a href="logs.html" class="btn btn-outline-light btn-sm me-2 active">Logs</a>
       </div>
    </div>
    </nav>

       <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>Fleet Vehicles</h4>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addVehicleModal">
                + Add Vehicle
            </button>
        </div>

    <div class="row g-3" id="vehiclesContainer">
        <div class="text-center text-muted py-5">Loading Vehicles..</div>
        </div>
    </div>

    <div class="modal fade" id="addVehicleModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">Add New Vehicle</h5>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addVehicleModal">
    + Add Vehicle
</button>
    </div>
    <div class="modal-body">
     <div id="addVehicleForm">
       <div class="mb-3">
        <label class="form-label">Plate Number</label>
       <input type="text" class="form-control" id="plate" placeholder="e.g. ABC 1234" required>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
        <label class="form-label">Brand</label>
        <input type="text" class="form-control" id="brand" placeholder="e.g. ABC 1234" required>

    </div>
    <div class="col-md-6 mb-3">
        <label class="form-label">Model</label>
        <input type="text" class="form-control" id="model" placeholder="e.g. ABC 1234" required>
 </div>

 </div>
 <div class="row">
    <div class="col-md-6 md-3">
    <label class="form-label">Type</label>
    <select class="form-select" id="type" required>
        <option value="">Select Type</option>
        <option value="Motorcycle">Motorcycle</option>
        <option value="Car">Car</option>
        <option value="Van">Van</option>
        <option value="Truck">Truck</option>
    </select>
    <div class="col md-6 md-3">
      <label class="form-label">Year</label>
      <input type="number" class="form-control" id="year" placeholder="2024">
    </div>
 </div>
       <div class="col md-6 md-3">
      <label class="form-label">Daily Rate</label>
      <input type="number" class="form-control" id="daily_rate" placeholder="2024">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" id="status" required>
          <option value="Available">Available</option>
          <option value="Rented">Rented</option>
          <option value="Maintenance">Maintenance</option>
        </select>
    </div>
    <form>
    </div>
    </form>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="addNewVehicle()">Save Vehicle</button>
    </div>
    </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js">
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        renderVehicles();
        });
    </script>
</body>
</html>
